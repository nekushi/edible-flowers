name: Edible Flowers

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Generate prisma client
        run: npx prisma generate

      - name: Debug env
        run: |
          echo "URL set: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL != '' }}"
          echo "KEY set: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY != '' }}"

      - name: Build project
        run: npm run build
